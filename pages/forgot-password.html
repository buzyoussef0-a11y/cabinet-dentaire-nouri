<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | Cabinet Dentaire Nouri</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/light-theme.css">
    <link rel="stylesheet" href="../css/widgets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="glass-card auth-card animate-fadeInUp">
            <h1 style="text-align: center; margin-bottom: 0.5rem;" data-ar="استعادة كلمة المرور" data-fr="Rétablir mot de passe">استعادة كلمة المرور</h1>
            <p class="auth-subtitle" data-ar="أدخل بريدك الإلكتروني المسجل وسنرسل لك رابطاً لتعيين كلمة مرور جديدة" data-fr="Entrez votre email et nous vous enverrons un lien de réinitialisation.">أدخل بريدك الإلكتروني المسجل وسنرسل لك رابطاً لتعيين كلمة مرور جديدة</p>

            <div id="errorBox" class="alert-error"></div>
            <div id="successBox" class="alert-success"
                style="display:none; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:10px; padding:14px 18px; color:#10B981; margin-bottom:20px; font-size:0.9rem;">
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label data-ar="البريد الإلكتروني" data-fr="E-mail">البريد الإلكتروني</label>
                    <input type="email" id="resetEmail" class="form-input" placeholder="example@mail.com" required>
                </div>
                <button type="submit" id="resetBtn" class="btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 10px;" data-ar="إرسال رابط الاستعادة" data-fr="Envoyer le lien">إرسال رابط الاستعادة</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="login.html" style="color: var(--text-dim); font-size: 0.88rem;" data-ar="← العودة لتسجيل الدخول" data-fr="← Retour à la connexion">← العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script>window._ROOT = '../';</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/forgot-password.js"></script>
    <script src="../js/toasts.js"></script>
    <script src="../js/i18n.js"></script>

</body>

</html>
