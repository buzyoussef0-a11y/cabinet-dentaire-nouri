<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Cabinet Dentaire Nouri</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="stylesheet" href="../css/widgets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0D9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cabinet Nouri">
    <style>
        #google-login-btn {
            background: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            width: 100%;
            padding: 14px;
            color: #0A1628;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        #google-login-btn:hover { background: #f5f5f5; }
    </style>
</head>

<body>

    <div id="scrollProgress">
        <div id="scrollFill"></div>
    </div>

    <nav id="mainNav" style="background:transparent; border:none; box-shadow:none;">
        <a href="../index.html" class="nav-logo nav-logo-v2">
  <div class="logo-mark">
    <svg width="36" height="36" viewBox="0 0 36 36"
         fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Hexagon background -->
      <path d="M18 2L32 10V26L18 34L4 26V10L18 2Z"
        fill="url(#hexFill)" opacity="0.15"/>
      <path d="M18 2L32 10V26L18 34L4 26V10L18 2Z"
        stroke="url(#hexStroke)" stroke-width="1"
        fill="none"/>
      <!-- Cross/Plus medical symbol -->
      <rect x="16" y="9" width="4" height="18"
        rx="2" fill="url(#crossFill)"/>
      <rect x="9" y="16" width="18" height="4"
        rx="2" fill="url(#crossFill)"/>
      <!-- Center dot -->
      <circle cx="18" cy="18" r="2.5"
        fill="white" opacity="0.9"/>
      <defs>
        <linearGradient id="hexFill"
          x1="4" y1="2" x2="32" y2="34"
          gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0df2f2"/>
          <stop offset="100%" stop-color="#0D9488"/>
        </linearGradient>
        <linearGradient id="hexStroke"
          x1="4" y1="2" x2="32" y2="34"
          gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0df2f2"/>
          <stop offset="100%" stop-color="#0D9488"/>
        </linearGradient>
        <linearGradient id="crossFill"
          x1="9" y1="9" x2="27" y2="27"
          gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0df2f2"/>
          <stop offset="100%" stop-color="white"
            stop-opacity="0.9"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <div class="logo-wordmark">
    <span class="logo-word-top">CABINET</span>
    <span class="logo-word-bottom">NOURI</span>
  </div>
</a>
    </nav>
    <div class="auth-container">
        <div class="glass-card auth-card animate-fadeInUp">
            <h1 style="text-align: center; margin-bottom: 0.5rem;" data-ar="تسجيل الدخول" data-fr="Connexion">تسجيل الدخول</h1>
            <p class="auth-subtitle" data-ar="مرحباً بك في Cabinet Dentaire Nouri — مكناس" data-fr="Bienvenue au Cabinet Dentaire Nouri — Meknès">مرحباً بك في Cabinet Dentaire Nouri — مكناس</p>

            <div id="errorBox" class="alert-error"></div>

            <!-- Google OAuth -->
            <button id="google-login-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                تسجيل الدخول بحساب Google
            </button>

            <div class="divider">— أو —</div>

            <form id="loginForm">
                <div class="form-group">
                    <label data-ar="رقم الهاتف أو البريد الإلكتروني" data-fr="Tél ou E-mail">رقم الهاتف أو البريد الإلكتروني</label>
                    <input type="text" id="loginPhone" class="form-input" placeholder="06XXXXXXXX أو email@example.com" data-placeholder-ar="06XXXXXXXX أو email@example.com" data-placeholder-fr="06XXXXXXXX ou email@example.com" required>
                </div>
                <div class="form-group">
                    <label data-ar="كلمة المرور" data-fr="Mot de passe">كلمة المرور</label>
                    <div class="form-group-password">
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                        <span class="password-toggle"
                            onclick="togglePasswordVisibility('loginPassword', this)">👁️</span>
                    </div>
                </div>
                <a href="forgot-password.html" class="forgot-password-link" data-ar="نسيت كلمة المرور؟" data-fr="Mot de passe oublié ?">نسيت كلمة المرور؟</a>
                <button type="submit" id="loginBtn" class="btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 10px;" data-ar="دخول" data-fr="Se connecter">دخول</button>
            </form>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.9rem;">
                ليس لديك حساب؟ <a href="register.html" style="color: var(--accent); font-weight: 700;" data-ar="سجّل الآن" data-fr="S'inscrire">سجّل الآن</a>
            </p>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="../index.html" style="color: var(--text-dim); font-size: 0.8rem;" data-ar="← العودة للرئيسية" data-fr="← Revenir à l'accueil">← العودة للرئيسية</a>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

    <!-- WhatsApp Button -->
    <a id="whatsappBtn" href="https://wa.me/212535402211?text=مرحباً%20دكتور%20نوري%2C%20أريد%20حجز%20موعد"
        target="_blank" aria-label="تواصل عبر واتساب">
        <svg viewBox="0 0 24 24" fill="white" width="26" height="26">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
            <path
                d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.123 1.532 5.855L.057 23.985l6.274-1.648A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.004-1.37l-.36-.213-3.724.977.994-3.634-.234-.374A9.818 9.818 0 1112 21.818z" />
        </svg>
    </a>

    <!-- Chat Widget -->
    <div id="chatWidget">
        <button id="chatToggle" onclick="toggleChat()" aria-label="المساعد الذكي"
            style="display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0D9488,#0df2f2);border:none;cursor:pointer;color:#0a1628;box-shadow:0 4px 24px rgba(13,242,242,0.4);font-size:1.4rem;font-family:'Cairo',sans-serif;transition:transform 0.3s ease;">
            <span style="font-size:1.3rem;line-height:1;">💬</span>
            <span style="font-size:0.55rem;font-weight:800;letter-spacing:0.5px;line-height:1;" data-ar="مساعد" data-fr="Assistant">مساعد</span>
        </button>
        <div id="chatWindow" class="chat-hidden">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-avatar">🦷</div>
                    <div>
                        <div class="chat-title" data-ar="مساعد Cabinet Nouri" data-fr="Assistant Cabinet Nouri">مساعد Cabinet Nouri</div>
                        <div class="chat-status" data-ar="متاح الآن" data-fr="Disponible">متاح الآن</div>
                    </div>
                </div>
                <button class="chat-close" onclick="toggleChat()">✕</button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك..." data-placeholder-ar="اكتب رسالتك..." data-placeholder-fr="Écrivez votre message..." onkeypress="handleChatKey(event)">
                <button id="chatSendBtn" onclick="sendChatMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>window._ROOT = '../';</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/login.js"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/toasts.js"></script>
    <script>
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://lighthearted-mooncake-e615fb.netlify.app/pages/complete-profile.html'
                }
            });
            if (error) alert('خطأ: ' + error.message);
        });
    </script>

</body>

</html>
