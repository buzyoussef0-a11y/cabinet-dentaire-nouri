    <div class="container" style="max-width: 800px;">
        <div class="glass-card animate-fadeInUp" style="padding: 50px; position: relative; overflow: hidden;">
            <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px;">
                <div id="profAvatar"
                    style="width: 100px; height: 100px; background: linear-gradient(135deg, #0D9488, #06B6D4); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white;">
                    ?</div>
                <div>
                    <h1 id="profName" style="margin-bottom: 5px;">---</h1>
                    <p id="profId" style="color: var(--accent); font-weight: 700;">ID: #----</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
                <div class="glass-card" style="padding: 24px; background: rgba(255,255,255,0.02); text-align: center;">
                    <h4 style="color: var(--text-muted); margin-bottom: 5px;" data-ar="إجمالي المواعيد" data-fr="Total des RDV">إجمالي المواعيد</h4>
                    <div id="statTotal" style="font-size: 2rem; font-weight: 900;">0</div>
                </div>
                <div class="glass-card" style="padding: 24px; background: rgba(255,255,255,0.02); text-align: center;">
                    <h4 style="color: var(--text-muted); margin-bottom: 5px;" data-ar="الحالة النشطة" data-fr="Statut actif">الحالة النشطة</h4>
                    <div id="statActive" style="font-size: 2rem; font-weight: 900;" class="text-gradient">0</div>
                </div>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;">
                <h3 style="margin-bottom: 20px;" data-ar="المعلومات الشخصية" data-fr="Infos Personnelles">المعلومات الشخصية</h3>
                <div style="display: grid; gap: 15px;">
                    <div
                        style="display:flex; justify-content:space-between; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px;">
                        <span style="color: var(--text-muted);" data-ar="رقم الهاتف" data-fr="Numéro de téléphone">رقم الهاتف</span>
                        <span id="profPhone">---</span>
                    </div>
                    <div
                        style="display:flex; justify-content:space-between; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px;">
                        <span style="color: var(--text-muted);" data-ar="البريد الإلكتروني" data-fr="E-mail">البريد الإلكتروني</span>
                        <span id="profEmail">---</span>
                    </div>
                </div>
            </div>
        </div>
        </div>

    <div id="toastContainer"></div>

        <!-- Chat Widget -->
        <div id="chatWidget">
            <button id="chatToggle" onclick="toggleChat()"
  aria-label="المساعد الذكي"
  style="display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0D9488,#0df2f2);border:none;cursor:pointer;color:#0a1628;box-shadow:0 4px 24px rgba(13,242,242,0.4);font-size:1.4rem;font-family:'Cairo',sans-serif;transition:transform 0.3s ease;">
  <span style="font-size:1.3rem;line-height:1;">💬</span>
  <span style="font-size:0.55rem;font-weight:800;letter-spacing:0.5px;line-height:1;" data-ar="مساعد" data-fr="Assistant">مساعد</span>
</button>
            <div id="chatWindow" class="chat-hidden">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="chat-avatar">🦷</div>
                        <div>
                            <div class="chat-title" data-ar="مساعد Cabinet Nouri" data-fr="Assistant Cabinet Nouri">مساعد Cabinet Nouri</div>
                            <div class="chat-status" data-ar="متاح الآن" data-fr="Disponible">متاح الآن</div>
                        </div>
                    </div>
                    <button class="chat-close" onclick="toggleChat()">✕</button>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." data-placeholder-ar="اكتب رسالتك..." data-placeholder-fr="Écrivez votre message..." onkeypress="handleChatKey(event)">
                    <button id="chatSendBtn" onclick="sendChatMessage()">➤</button>
                </div>
            </div>
        </div>

    <script src="../js/auth.js"></script>
        <script src="../js/main.js"></script>
        <script src="../js/i18n.js"></script>
        <script src="../js/chat.js"></script>
        <script src="../js/toasts.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var user = null;
                try { user = JSON.parse(localStorage.getItem('dental_current_user')); } catch (e) { }
                if (!user) { window.location.href = 'login.html'; return; }

                var first = (user.fullName || '?').charAt(0).toUpperCase();
                document.getElementById('profAvatar').textContent = first;
                document.getElementById('profName').textContent = user.fullName || '---';
                document.getElementById('profId').textContent = 'ID: #' + (user.id || '----');
                document.getElementById('profPhone').textContent = user.phone || '---';
                document.getElementById('profEmail').textContent = user.email || '---';

                try {
                    var apps = JSON.parse(localStorage.getItem('dental_appointments') || '[]');
                    document.getElementById('statTotal').textContent = apps.length;
                    var active = apps.filter(function (a) { return a.status !== 'cancelled'; }).length;
                    document.getElementById('statActive').textContent = active;
                } catch (e) { }
            });

            function logoutUser() {
                localStorage.removeItem('dental_current_user');
                window.location.href = 'index.html';
            }
        </script>
