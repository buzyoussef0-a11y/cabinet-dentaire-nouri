<!--
  SUPABASE SETUP REQUIRED:
  1. Go to Supabase Dashboard → Authentication → Providers → Google → Enable
  2. Add your Google OAuth Client ID and Secret
  3. Add redirect URL: https://your-site.netlify.app/pages/complete-profile.html
  4. Make sure 'profiles' table exists with columns: id, full_name, phone, email, avatar_url
-->
<!--
  IF PROFILES TABLE MISSING — Run this in Supabase SQL Editor:

  CREATE TABLE IF NOT EXISTS profiles (
    id UUID REFERENCES auth.users(id) PRIMARY KEY,
    full_name TEXT,
    phone TEXT,
    email TEXT,
    avatar_url TEXT,
    updated_at TIMESTAMPTZ DEFAULT NOW()
  );

  ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;

  CREATE POLICY "Users can upsert own profile" ON profiles
    FOR ALL USING (auth.uid() = id);
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكمل ملفك الشخصي | Cabinet Dentaire Nouri</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0D9488">
  <style>
    body {
      background: #0A1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      font-family: 'Cairo', sans-serif;
    }
    .complete-profile-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(30,111,217,0.3);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    #google-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(30,111,217,0.4);
      margin-bottom: 16px;
      display: none;
    }
    .complete-profile-card h2 {
      color: #F1F5F9;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .complete-profile-card > p {
      color: rgba(241,245,249,0.6);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .cp-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #F1F5F9;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      margin-bottom: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
      text-align: right;
    }
    .cp-input:focus {
      outline: none;
      border-color: rgba(30,111,217,0.6);
    }
    .cp-input::placeholder { color: rgba(241,245,249,0.35); }
    #complete-btn {
      background: #1E6FD9;
      border: none;
      border-radius: 50px;
      width: 100%;
      padding: 14px;
      color: white;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.15s;
    }
    #complete-btn:hover:not(:disabled) { background: #1a5fc4; }
    #complete-btn:active:not(:disabled) { transform: scale(0.98); }
    #complete-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #cp-error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
      text-align: right;
    }
  </style>
</head>

<body>

  <div class="complete-profile-card">
    <img id="google-avatar" alt="صورة الحساب">
    <h2>أكمل ملفك الشخصي 🦷</h2>
    <p>مرحباً! أضف معلوماتك لإكمال التسجيل</p>

    <div id="cp-error"></div>

    <input class="cp-input" type="text" id="full-name" placeholder="الاسم الكامل *" required>
    <input class="cp-input" type="tel" id="whatsapp" placeholder="رقم الواتساب * (06XXXXXXXX)" required>

    <button id="complete-btn">✅ إكمال التسجيل</button>
  </div>

  <script>window._ROOT = '../';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      // Handle OAuth PKCE redirect — wait for session to settle
      let session = null;
      let settled = false;

      await new Promise(resolve => {
        const { data } = window.supabase.auth.onAuthStateChange((event, s) => {
          if (settled) return;
          settled = true;
          session = s;
          data.subscription.unsubscribe();
          resolve();
        });
        // Also check immediately in case session already exists
        window.supabase.auth.getSession().then(({ data: { session: s } }) => {
          if (settled) return;
          if (s) { settled = true; session = s; resolve(); }
        });
        // Timeout fallback
        setTimeout(() => { if (!settled) { settled = true; resolve(); } }, 3000);
      });

      const { data: { user } } = await window.supabase.auth.getUser();
      if (!user) {
        window.location.href = '/pages/login.html';
        return;
      }
      currentUser = user;

      // Check if profile already complete
      const { data: profile } = await window.supabase
        .from('profiles')
        .select('phone')
        .eq('id', user.id)
        .single();

      if (profile?.phone) {
        window.location.href = '/index.html';
        return;
      }

      // Show avatar and pre-fill name
      const avatar = document.getElementById('google-avatar');
      if (user.user_metadata?.avatar_url) {
        avatar.src = user.user_metadata.avatar_url;
        avatar.style.display = 'block';
      }
      document.getElementById('full-name').value = user.user_metadata?.full_name || '';
    }

    document.getElementById('complete-btn').addEventListener('click', async () => {
      const btn = document.getElementById('complete-btn');
      const name  = document.getElementById('full-name').value.trim();
      const phone = document.getElementById('whatsapp').value.trim();

      if (!name || !phone) {
        alert('يرجى ملء جميع الحقول');
        return;
      }

      btn.textContent = 'جاري الحفظ...';
      btn.disabled = true;

      try {
        const { data: { user }, error: userError } = await window.supabase.auth.getUser();

        if (userError || !user) {
          alert('خطأ: المستخدم غير مسجل الدخول');
          btn.textContent = '✅ إكمال التسجيل';
          btn.disabled = false;
          return;
        }

        const { data, error } = await window.supabase
          .from('profiles')
          .upsert({
            id: user.id,
            full_name: name,
            phone: phone,
            email: user.email,
            avatar_url: user.user_metadata?.avatar_url || '',
            updated_at: new Date().toISOString()
          }, { onConflict: 'id' });

        if (error) {
          alert('خطأ في الحفظ: ' + error.message + '\nCode: ' + error.code);
          btn.textContent = '✅ إكمال التسجيل';
          btn.disabled = false;
          return;
        }

        window.location.href = '/index.html';

      } catch(e) {
        alert('خطأ غير متوقع: ' + e.message);
        btn.textContent = '✅ إكمال التسجيل';
        btn.disabled = false;
      }
    });

    function showError(msg) {
      const el = document.getElementById('cp-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    init();
  </script>

</body>

</html>
