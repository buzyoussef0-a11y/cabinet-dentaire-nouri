<!--
  SUPABASE SETUP REQUIRED:
  1. Go to Supabase Dashboard → Authentication → Providers → Google → Enable
  2. Add your Google OAuth Client ID and Secret
  3. Add redirect URL: https://your-site.netlify.app/pages/complete-profile.html
  4. Make sure 'profiles' table exists with columns: id, full_name, phone, email, avatar_url
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكمل ملفك الشخصي | Cabinet Dentaire Nouri</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/light-theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0D9488">
  <style>
/* ═══════════════════════════════════════
   Complete Profile — Full-screen centered
═══════════════════════════════════════ */
body {
  background: linear-gradient(160deg, #001133 0%, #0A2040 40%, #003d3b 75%, #006a67 100%) !important;
  min-height: 100vh !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  padding: 40px 20px !important;
  font-family: 'Cairo', sans-serif !important;
  position: relative;
  overflow: hidden;
}

/* Background blobs */
body::before, body::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: cpBlob 10s ease-in-out infinite;
}
body::before {
  width: 350px; height: 350px;
  background: rgba(0,106,103,0.35);
  top: -80px; right: -60px;
  animation-delay: 0s;
}
body::after {
  width: 250px; height: 250px;
  background: rgba(183,236,234,0.12);
  bottom: -50px; left: -50px;
  animation-delay: -4s;
}
@keyframes cpBlob {
  0%, 100% { transform: scale(1) translateY(0); }
  50%       { transform: scale(1.06) translateY(-20px); }
}

/* Dot grid overlay */
.cp-grid {
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 26px 26px;
  pointer-events: none;
  z-index: 0;
}

/* ── Card ── */
.cp-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.97);
  border: 1px solid rgba(0,106,103,0.15);
  border-radius: 28px;
  padding: 48px 44px;
  width: 100%;
  max-width: 420px;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9);
  animation: cpSlide 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  text-align: center;
}
@keyframes cpSlide {
  from { transform: translateY(36px) scale(0.95); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

/* Logo */
.cp-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 28px;
}
.cp-logo-words { display: flex; flex-direction: column; font-family: 'Cairo', sans-serif; }
.cp-logo-words span:first-child { font-size: 0.55rem; font-weight: 700; letter-spacing: 3px; color: rgba(0,106,103,0.55); }
.cp-logo-words span:last-child  { font-size: 0.95rem; font-weight: 900; letter-spacing: 2px; color: #001133; }

/* Avatar */
#google-avatar {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(0,106,103,0.3);
  box-shadow: 0 4px 20px rgba(0,106,103,0.2);
  margin-bottom: 16px;
  display: none;
}

/* Header text */
.cp-card h2 {
  color: #001133 !important;
  font-family: 'Cairo', sans-serif !important;
  font-size: 1.5rem !important;
  font-weight: 900 !important;
  margin: 0 0 8px 0 !important;
}
.cp-card > p, .cp-subtitle {
  color: #64748b !important;
  font-size: 0.88rem !important;
  margin: 0 0 28px 0 !important;
  font-family: 'Cairo', sans-serif !important;
  line-height: 1.5 !important;
}

/* ── Step indicator ── */
.cp-steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
}
.cp-step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #e2e8f0;
  transition: all 0.3s ease;
}
.cp-step-dot.active {
  background: #006a67;
  width: 24px;
  border-radius: 4px;
}

/* ── Inputs ── */
.cp-input {
  width: 100%;
  padding: 13px 16px;
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  color: #001133;
  font-family: 'Cairo', sans-serif;
  font-size: 0.93rem;
  margin-bottom: 14px;
  box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-align: right;
}
.cp-input:focus {
  outline: none;
  border-color: #006a67;
  box-shadow: 0 0 0 3px rgba(0,106,103,0.09);
  background: #ffffff;
}
.cp-input::placeholder { color: #94a3b8; }

/* Input label */
.cp-label {
  display: block;
  text-align: right;
  font-family: 'Cairo', sans-serif;
  font-size: 0.81rem;
  font-weight: 600;
  color: #374151;
  margin-bottom: 6px;
  margin-top: 4px;
}

/* ── Submit button ── */
#complete-btn {
  background: linear-gradient(135deg, #006a67, #009e99) !important;
  border: none !important;
  border-radius: 12px !important;
  width: 100% !important;
  padding: 14px !important;
  color: white !important;
  font-family: 'Cairo', sans-serif !important;
  font-size: 1rem !important;
  font-weight: 800 !important;
  cursor: pointer !important;
  margin-top: 6px !important;
  box-shadow: 0 6px 24px rgba(0,106,103,0.35) !important;
  transition: all 0.25s ease !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;
}
#complete-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, #004d4b, #006a67) !important;
  box-shadow: 0 10px 32px rgba(0,106,103,0.45) !important;
  transform: translateY(-1px) !important;
}
#complete-btn:active:not(:disabled) { transform: scale(0.98) !important; }
#complete-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── Error ── */
#cp-error {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.25);
  color: #dc2626;
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  margin-bottom: 14px;
  display: none;
  text-align: right;
}

/* Trust bar */
.cp-trust {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid #f0f4f8;
}
.cp-trust-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.72rem;
  color: #94a3b8;
}

/* Back link */
.cp-back {
  display: block;
  text-align: center;
  margin-top: 16px;
  color: #94a3b8;
  font-size: 0.78rem;
  font-family: 'Cairo', sans-serif;
  text-decoration: none;
}
.cp-back:hover { color: #64748b; }

@media (max-width: 480px) {
  .cp-card { padding: 36px 24px; border-radius: 24px; }
  .cp-card h2 { font-size: 1.3rem !important; }
}
  </style>
</head>

<body>
  <div class="cp-grid"></div>

  <div class="cp-card">
    <!-- Logo -->
    <a href="../index.html" class="cp-logo">
      <svg width="34" height="34" viewBox="0 0 36 36" fill="none">
        <path d="M18 2L32 10V26L18 34L4 26V10L18 2Z" fill="url(#cpHex)" opacity="0.15"/>
        <path d="M18 2L32 10V26L18 34L4 26V10L18 2Z" stroke="url(#cpHex)" stroke-width="1.2" fill="none"/>
        <rect x="16" y="9" width="4" height="18" rx="2" fill="url(#cpCross)"/>
        <rect x="9" y="16" width="18" height="4" rx="2" fill="url(#cpCross)"/>
        <circle cx="18" cy="18" r="2.5" fill="white" opacity="0.9"/>
        <defs>
          <linearGradient id="cpHex" x1="4" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#006a67"/><stop offset="100%" stop-color="#009e99"/>
          </linearGradient>
          <linearGradient id="cpCross" x1="9" y1="9" x2="27" y2="27" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#006a67"/><stop offset="100%" stop-color="#009e99"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="cp-logo-words">
        <span>CABINET</span>
        <span>NOURI</span>
      </div>
    </a>

    <!-- Step dots -->
    <div class="cp-steps">
      <div class="cp-step-dot"></div>
      <div class="cp-step-dot active"></div>
      <div class="cp-step-dot"></div>
    </div>

    <!-- Avatar (shown after Google OAuth) -->
    <img id="google-avatar" alt="صورة الحساب">

    <!-- Header -->
    <h2>أكمل ملفك الشخصي 🦷</h2>
    <p class="cp-subtitle">مرحباً! أضف معلوماتك لإكمال التسجيل</p>

    <!-- Error -->
    <div id="cp-error"></div>

    <!-- Fields -->
    <label class="cp-label" for="full-name">الاسم الكامل *</label>
    <input class="cp-input" type="text" id="full-name" placeholder="أدخل اسمك الكامل" required>

    <label class="cp-label" for="whatsapp">رقم الواتساب *</label>
    <input class="cp-input" type="tel" id="whatsapp" placeholder="06XXXXXXXX" required>

    <button id="complete-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      إكمال التسجيل
    </button>

    <!-- Trust bar -->
    <div class="cp-trust">
      <div class="cp-trust-item">🔒 <span>بيانات مشفرة</span></div>
      <div class="cp-trust-item">✅ <span>مجاني تماماً</span></div>
      <div class="cp-trust-item">⚡ <span>فوري</span></div>
    </div>

    <a href="../index.html" class="cp-back">← العودة للرئيسية</a>
  </div>

  <script>window._ROOT = '../';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      let session = null;
      let settled = false;

      await new Promise(resolve => {
        const { data } = window.supabase.auth.onAuthStateChange((event, s) => {
          if (settled) return;
          settled = true;
          session = s;
          data.subscription.unsubscribe();
          resolve();
        });
        window.supabase.auth.getSession().then(({ data: { session: s } }) => {
          if (settled) return;
          if (s) { settled = true; session = s; resolve(); }
        });
        setTimeout(() => { if (!settled) { settled = true; resolve(); } }, 3000);
      });

      const { data: { user } } = await window.supabase.auth.getUser();
      if (!user) {
        window.location.href = '/pages/login.html';
        return;
      }
      currentUser = user;

      const { data: profile, error: profileError } = await window.supabase
        .from('profiles').select('full_name, phone').eq('id', user.id).single();

      console.log('Profile check:', profile, profileError);

      if (profile && profile.full_name && profile.phone) {
        console.log('Profile complete, redirecting to home');
        window.location.href = 'https://cabinet-dentaire-nouri.vercel.app/index.html';
        return;
      }

      const avatar = document.getElementById('google-avatar');
      if (user.user_metadata?.avatar_url) {
        avatar.src = user.user_metadata.avatar_url;
        avatar.style.display = 'block';
      }
      if (user.user_metadata?.full_name) {
        document.getElementById('full-name').value = user.user_metadata.full_name;
      }
    }

    document.getElementById('complete-btn').addEventListener('click', async () => {
      const name  = document.getElementById('full-name').value.trim();
      const phone = document.getElementById('whatsapp').value.trim();
      const err   = document.getElementById('cp-error');

      if (!name || !phone) {
        err.style.display = 'block';
        err.textContent = '⚠️ يرجى ملء جميع الحقول المطلوبة';
        return;
      }
      if (!/^0[5-7][0-9]{8}$/.test(phone)) {
        err.style.display = 'block';
        err.textContent = '⚠️ رقم الهاتف غير صحيح (مثال: 06XXXXXXXX)';
        return;
      }

      err.style.display = 'none';
      const btn = document.getElementById('complete-btn');
      btn.disabled = true;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="2.5" stroke-dasharray="32" stroke-dashoffset="32" style="stroke-dashoffset:0;opacity:0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg> جارٍ الحفظ...';

      const { error } = await window.supabase.from('profiles').upsert({
        id: currentUser.id,
        full_name: name,
        phone: phone,
        email: currentUser.email,
        updated_at: new Date().toISOString()
      });

      if (error) {
        err.style.display = 'block';
        err.textContent = '❌ حدث خطأ أثناء الحفظ. حاول مرة أخرى.';
        btn.disabled = false;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> إكمال التسجيل';
      } else {
        window.location.href = 'https://cabinet-dentaire-nouri.vercel.app/index.html';
      }
    });

    init();
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
