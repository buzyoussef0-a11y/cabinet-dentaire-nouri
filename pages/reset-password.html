<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | Cabinet Dentaire Nouri</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/light-theme.css">
    <link rel="stylesheet" href="../css/widgets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="glass-card auth-card animate-fadeInUp">
            <h1 style="text-align: center; margin-bottom: 0.5rem;" data-ar="تعيين كلمة مرور جديدة" data-fr="Définir nouveau mot de passe">تعيين كلمة مرور جديدة</h1>
            <p class="auth-subtitle" data-ar="يرجى إدخال كلمة المرور الجديدة الخاصة بك" data-fr="Veuillez entrer votre nouveau mot de passe">يرجى إدخال كلمة المرور الجديدة الخاصة بك</p>

            <div id="errorBox" class="alert-error"></div>
            <div id="successBox" class="alert-success"
                style="display:none; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:10px; padding:14px 18px; color:#10B981; margin-bottom:20px; font-size:0.9rem;">
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label data-ar="كلمة المرور الجديدة" data-fr="Nouveau mot de passe">كلمة المرور الجديدة</label>
                    <div class="form-group-password">
                        <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required
                            minlength="6">
                        <span class="password-toggle" onclick="togglePasswordVisibility('newPassword', this)">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label data-ar="تأكيد كلمة المرور" data-fr="Confirmer mot de passe">تأكيد كلمة المرور</label>
                    <div class="form-group-password">
                        <input type="password" id="confirmNewPassword" class="form-input" placeholder="••••••••"
                            required minlength="6">
                        <span class="password-toggle"
                            onclick="togglePasswordVisibility('confirmNewPassword', this)">👁️</span>
                    </div>
                </div>
                <button type="submit" id="updateBtn" class="btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 10px;" data-ar="حفظ كلمة المرور الجديدة" data-fr="Enregistrer">حفظ كلمة المرور الجديدة</button>
            </form>

            <div id="loginLinkContainer" style="text-align: center; margin-top: 1.5rem; display:none;">
                <a href="login.html" class="btn-primary" style="display:inline-block; text-decoration:none;">التوجيه
                    لتسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script>window._ROOT = '../';</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/reset-password.js"></script>
    <script src="../js/toasts.js"></script>
    <script src="../js/i18n.js"></script>

</body>

</html>
